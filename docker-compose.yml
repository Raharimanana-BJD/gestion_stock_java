services:
  # 1. Base de données PostgreSQL
  postgres:
    image: postgres:latest
    container_name: gestion_stock_db
    environment:
      POSTGRES_DB: stock_db
      POSTGRES_USER: brayan
      POSTGRES_PASSWORD: superpassword
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/
    networks:
      - stock-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U brayan -d stock_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Application Backend Spring Boot
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gestion_stock_backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/stock_db
      - SPRING_DATASOURCE_USERNAME=brayan
      - SPRING_DATASOURCE_PASSWORD=superpassword
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - stock-network

  # 3. Serveur Jenkins pour le CI/CD
  jenkins:
    image: jenkins/jenkins:lts-jdk17
    container_name: gestion_stock_jenkins
    privileged: true
    user: root
    ports:
      - "8081:8080"
      - "50000:50000"
    volumes:
      - jenkins_data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - stock-network
    depends_on:
      - postgres

networks:
  stock-network:
    driver: bridge

volumes:
  pgdata:
  jenkins_data:
